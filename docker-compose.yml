version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  worker:
    build: .
    command: php artisan queue:work
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  scheduler:
    build: .
    command: php artisan schedule:work
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: deploy_demo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: