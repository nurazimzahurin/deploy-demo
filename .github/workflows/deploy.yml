name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-southeast-1 | \
          docker login --username AWS --password-stdin 867344443810.dkr.ecr.ap-southeast-1.amazonaws.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build image
        run: |
          docker build \
            -t 867344443810.dkr.ecr.ap-southeast-1.amazonaws.com/deploy-demo:${{ github.sha }} \
            -t 867344443810.dkr.ecr.ap-southeast-1.amazonaws.com/deploy-demo:latest \
            .

      - name: Push image
        run: |
          docker push 867344443810.dkr.ecr.ap-southeast-1.amazonaws.com/deploy-demo:${{ github.sha }}
          docker push 867344443810.dkr.ecr.ap-southeast-1.amazonaws.com/deploy-demo:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster deploy-demo \
            --service deploy-demo-service \
            --force-new-deployment \
            --region ap-southeast-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}