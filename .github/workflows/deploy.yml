name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/deploy-demo:latest .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/deploy-demo:latest

      - name: Run tests
        run: docker run --rm ghcr.io/${{ github.repository_owner }}/deploy-demo:latest php artisan test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to Railway
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { deploymentCreate(input: { projectId: \"4f58a5d5-75fa-4a29-93e7-d6f859f1f14b\", serviceId: \"1da0ab5a-6f86-4355-b73a-15f5a16edc32\" }) { id } }"}' \
            https://backboard.railway.app/graphql/v2
