name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/deploy-demo:latest .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/deploy-demo:latest

      - name: Run tests
        run: docker run --rm ghcr.io/${{ github.repository_owner }}/deploy-demo:latest php artisan test
